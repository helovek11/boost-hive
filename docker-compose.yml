## Version field removed to align with Docker Compose Specification v2+
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: boost_hive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_production}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: boost-hive-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/boost_hive"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-change_me_in_production}@redis:6379"
      PORT: 3000
      NODE_ENV: production
      PROFI_LIKE_API_URL: "https://api.profi-like.ru/v1"
      PROFI_LIKE_API_KEY: "${PROFI_LIKE_API_KEY}"
      PROFI_LIKE_MARKUP_PERCENT: "10"
      JWT_SECRET: "${JWT_SECRET}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
